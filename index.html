<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minnio – Bok-barometer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0A06; --surface: #1A1008; --surface2: #231508;
  --gold: #C8933A; --gold2: #E0B060;
  --text: #F0E8DC; --text2: #A8896E;
  --sage: #6B8F68; --rust: #B5654A;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text); min-height:100vh;
  font-family:'DM Sans',sans-serif; padding:20px;
}
.wrap { max-width:900px; margin:0 auto; }
h1 { font-family:'Lora',serif; color:var(--gold2); font-size:1.7rem; margin-bottom:4px; }
.sub { color:var(--text2); margin-bottom:20px; font-size:0.9rem; }
.login {
  max-width:360px; margin:80px auto; background:var(--surface);
  padding:32px; border-radius:12px; border:1px solid rgba(200,147,58,0.2);
}
.login input {
  width:100%; background:var(--bg); border:1px solid rgba(200,147,58,0.3);
  color:var(--text); padding:12px; border-radius:8px; font-size:1rem; margin:12px 0;
}
button {
  background:var(--gold); color:var(--bg); border:none;
  padding:11px 18px; border-radius:8px; font-size:0.95rem;
  cursor:pointer; font-weight:500; font-family:inherit;
}
button:hover { background:var(--gold2); }
button.ghost {
  background:transparent; color:var(--text2);
  border:1px solid rgba(200,147,58,0.3);
}
button.ghost:hover { background:var(--surface2); color:var(--text); }
button.tiny { padding:6px 10px; font-size:0.8rem; }

.toolbar {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  margin-bottom:18px;
}
.toolbar .spacer { flex:1; }

.row {
  display:flex; align-items:center; gap:12px;
  background:var(--surface); border:1px solid rgba(200,147,58,0.12);
  border-radius:10px; padding:14px 16px; margin-bottom:8px;
  cursor:pointer; transition:0.15s;
}
.row:hover { border-color:var(--gold); background:var(--surface2); }
.row.archived { opacity:0.5; }
.row-main { flex:1; min-width:0; }
.row-name {
  font-family:'Lora',serif; font-size:1.1rem; color:var(--gold2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.row-meta { font-size:0.8rem; color:var(--text2); margin-top:2px; }
.dots { display:flex; gap:4px; align-items:center; }
.dot { width:9px; height:9px; border-radius:50%; background:var(--surface2); }
.dot.on { background:var(--gold); }
.dot.rik { background:var(--sage); }
.row-pct {
  font-size:1rem; color:var(--text); min-width:46px; text-align:right;
  font-variant-numeric:tabular-nums;
}
.row-actions { display:flex; gap:6px; }

.empty { text-align:center; color:var(--text2); padding:50px 20px; }
.error-msg { color:var(--rust); margin-top:12px; font-size:0.9rem; }

.detail-overlay {
  position:fixed; inset:0; background:rgba(15,10,6,0.97);
  z-index:100; overflow-y:auto; padding:20px;
}
.detail-card {
  max-width:780px; margin:0 auto; background:var(--surface);
  border-radius:14px; padding:28px;
}
.detail-head {
  display:flex; justify-content:space-between; align-items:flex-start;
  gap:16px; flex-wrap:wrap; margin-bottom:20px;
}
.detail-name { font-family:'Lora',serif; font-size:1.5rem; color:var(--gold2); }
.detail-meta { font-size:0.85rem; color:var(--text2); margin-top:4px; }
.verdict {
  display:inline-block; padding:6px 14px; border-radius:20px;
  font-size:0.85rem; font-weight:500;
}
.verdict.klar { background:rgba(107,143,104,0.2); color:var(--sage); border:1px solid var(--sage); }
.verdict.snart { background:rgba(224,176,96,0.15); color:var(--gold2); border:1px solid var(--gold); }
.verdict.halvveis { background:rgba(181,101,74,0.15); color:var(--rust); border:1px solid var(--rust); }
.verdict.tidlig { background:rgba(168,137,110,0.15); color:var(--text2); border:1px solid var(--text2); }
.stats-row {
  display:flex; gap:24px; flex-wrap:wrap; margin-bottom:22px;
  font-size:0.9rem; color:var(--text2);
}
.stats-row strong { color:var(--gold2); font-size:1.1rem; display:block; }
.chapter { background:var(--bg); border-radius:8px; padding:14px; margin-bottom:10px; }
.chapter-title { font-size:0.95rem; margin-bottom:8px; display:flex; justify-content:space-between; }
.chapter-pct { color:var(--text2); }
.bar { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; }
.bar-fill.rik { background:var(--sage); }
.bar-fill.god { background:var(--gold); }
.bar-fill.pabegynt { background:var(--rust); }
.detail-actions {
  display:flex; gap:10px; flex-wrap:wrap; margin-top:24px;
  border-top:1px solid rgba(200,147,58,0.15); padding-top:20px;
}
.link {
  font-family:monospace; font-size:0.78rem; color:var(--gold);
  word-break:break-all; margin-top:6px;
}
</style>
</head>
<body>
<div class="wrap">

  <div id="login" class="login">
    <h1>Bok-barometer</h1>
    <p class="sub">Logg inn for å se samtaler</p>
    <input type="password" id="admin-key" placeholder="Admin-nøkkel" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Logg inn</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <div id="dashboard" style="display:none;">
    <h1>Bok-barometer</h1>
    <p class="sub" id="count-label">Laster...</p>
    <div class="toolbar">
      <button onclick="loadSessions()">↻ Oppdater</button>
      <button class="ghost" id="toggle-archived" onclick="toggleArchived()">Vis arkiverte</button>
      <div class="spacer"></div>
      <a href="/admin.html" style="color:var(--text2);text-decoration:none;font-size:0.85rem;">+ Ny samtale</a>
    </div>
    <div id="sessions"></div>
  </div>

</div>

<div id="detail" style="display:none;"></div>

<script>
let adminKey = '';
let allSessions = [];
let showArchived = false;

function doLogin() {
  adminKey = document.getElementById('admin-key').value.trim();
  if (!adminKey) return;
  loadSessions();
}

async function loadSessions() {
  const errBox = document.getElementById('login-error');
  errBox.textContent = '';
  try {
    const res = await fetch(`/api/sessions-overview?key=${encodeURIComponent(adminKey)}`);
    if (res.status === 401) { errBox.textContent = 'Feil admin-nøkkel'; return; }
    if (!res.ok) { errBox.textContent = 'Noe gikk galt. Prøv igjen.'; return; }
    const data = await res.json();
    allSessions = data.sessions;
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderList();
  } catch (e) {
    errBox.textContent = 'Kunne ikke koble til: ' + e.message;
  }
}

function toggleArchived() {
  showArchived = !showArchived;
  document.getElementById('toggle-archived').textContent =
    showArchived ? 'Skjul arkiverte' : 'Vis arkiverte';
  renderList();
}

function escapeHtml(t) {
  if (!t) return '';
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function verdictClass(v) {
  if (v.includes('klar til å produseres')) return 'klar';
  if (v.includes('Snart klar')) return 'snart';
  if (v.includes('Halvveis')) return 'halvveis';
  return 'tidlig';
}

function renderList() {
  const container = document.getElementById('sessions');
  const visible = allSessions.filter(s => showArchived ? s.archived : !s.archived);
  const activeCount = allSessions.filter(s => !s.archived).length;
  const archCount = allSessions.filter(s => s.archived).length;

  document.getElementById('count-label').textContent =
    `${activeCount} aktive samtaler${archCount ? ` · ${archCount} arkivert` : ''}`;

  if (!visible.length) {
    container.innerHTML = `<div class="empty">${showArchived ? 'Ingen arkiverte samtaler' : 'Ingen aktive samtaler. Opprett en på /admin.html'}</div>`;
    return;
  }

  container.innerHTML = visible.map(s => {
    const b = s.book;
    let dots = '';
    for (let i = 0; i < 5; i++) {
      const threshold = (i + 1) * 20;
      let cls = 'dot';
      if (b.avgRichness >= threshold) cls += b.avgRichness >= 70 ? ' rik' : ' on';
      dots += `<span class="${cls}"></span>`;
    }
    const updated = s.updatedAt ? new Date(s.updatedAt).toLocaleDateString('no-NO') : '–';
    return `
      <div class="row ${s.archived ? 'archived' : ''}" onclick="openDetail('${escapeHtml(s.id)}')">
        <div class="row-main">
          <div class="row-name">${escapeHtml(s.name)}</div>
          <div class="row-meta">${s.messageCount} meldinger · ${escapeHtml(s.status)} · ${updated}</div>
        </div>
        <div class="dots">${dots}</div>
        <div class="row-pct">${b.avgRichness}%</div>
        <div class="row-actions" onclick="event.stopPropagation()">
          <button class="ghost tiny" onclick="toggleArchive('${escapeHtml(s.id)}', ${!s.archived})">
            ${s.archived ? '↩ Hent' : '🗑 Arkiver'}
          </button>
        </div>
      </div>`;
  }).join('');
}

async function toggleArchive(id, archived) {
  const verb = archived ? 'arkivere' : 'hente tilbake';
  if (!confirm(`Vil du ${verb} denne samtalen?`)) return;
  try {
    const res = await fetch(`/api/session-archive?key=${encodeURIComponent(adminKey)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: id, archived })
    });
    if (!res.ok) { alert('Kunne ikke endre. Prøv igjen.'); return; }
    const s = allSessions.find(x => x.id === id);
    if (s) s.archived = archived;
    renderList();
  } catch (e) {
    alert('Feil: ' + e.message);
  }
}

function openDetail(id) {
  const s = allSessions.find(x => x.id === id);
  if (!s) return;
  const b = s.book;
  const vClass = verdictClass(b.verdict);

  const chaptersHtml = b.chapterStatus.map(ch => {
    let fillClass = 'pabegynt';
    if (ch.richness >= 70) fillClass = 'rik';
    else if (ch.ready) fillClass = 'god';
    return `
      <div class="chapter">
        <div class="chapter-title">
          <span>${escapeHtml(ch.title)}</span>
          <span class="chapter-pct">${ch.richness}%</span>
        </div>
        <div class="bar"><div class="bar-fill ${fillClass}" style="width:${ch.richness}%"></div></div>
      </div>`;
  }).join('');

  const detail = document.getElementById('detail');
  detail.style.display = 'block';
  detail.innerHTML = `
    <div class="detail-overlay" onclick="if(event.target===this)closeDetail()">
      <div class="detail-card">
        <div class="detail-head">
          <div>
            <div class="detail-name">${escapeHtml(s.name)}</div>
            <div class="detail-meta">
              ${s.buyer ? 'Kjøper: ' + escapeHtml(s.buyer) + ' · ' : ''}
              ${s.messageCount} meldinger · Status: ${escapeHtml(s.status)}
            </div>
            <div class="link">minnio.app/s/${escapeHtml(s.id)}</div>
          </div>
          <div class="verdict ${vClass}">${escapeHtml(b.verdict)}</div>
        </div>
        <div class="stats-row">
          <div><strong>${b.goodChapters}/${b.totalChapters}</strong>kapitler klare</div>
          <div><strong>~${b.estimatedPages}</strong>sider estimert</div>
          <div><strong>${b.avgRichness}%</strong>snittdybde</div>
        </div>
        ${chaptersHtml}
        <div class="detail-actions">
          <button onclick="generateBook('${escapeHtml(s.id)}', '${escapeHtml(s.name)}')">📖 Lag bokutkast</button>
          <button class="ghost" onclick="toggleArchive('${escapeHtml(s.id)}', ${!s.archived}); closeDetail()">
            ${s.archived ? '↩ Hent tilbake' : '🗑 Arkiver'}
          </button>
          <button class="ghost" onclick="closeDetail()">Lukk</button>
        </div>
      </div>
    </div>`;
}

function closeDetail() {
  document.getElementById('detail').style.display = 'none';
  document.getElementById('detail').innerHTML = '';
}

async function generateBook(sessionId, name) {
  if (!confirm(`Lage bokutkast for ${name}? Dette tar 1-2 minutter.`)) return;
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div class="detail-overlay">
      <div class="detail-card" style="text-align:center;">
        <div style="color:var(--gold2);font-family:'Lora',serif;font-size:1.3rem;margin-bottom:12px;">
          Skriver boka til ${escapeHtml(name)}...
        </div>
        <div style="color:var(--text2);">Dette tar 1-2 minutter. Bok-redaktøren jobber.</div>
        <div id="book-result" style="margin-top:24px;"></div>
      </div>
    </div>`;

  try {
    const res = await fetch(`/api/compose-book?key=${encodeURIComponent(adminKey)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId })
    });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('book-result').innerHTML =
        `<div style="color:var(--rust);">Feil: ${escapeHtml(data.error || 'ukjent')}</div>
         <button class="ghost" style="margin-top:16px;" onclick="closeDetail()">Lukk</button>`;
      return;
    }
    const chapters = data.bookDraft.chapters.filter(c => !c.skipped && c.text);
    let html = `<div style="background:var(--bg);border-radius:12px;padding:28px;max-height:65vh;overflow-y:auto;text-align:left;">`;
    html += `<h2 style="font-family:'Lora',serif;color:var(--gold2);text-align:center;margin-bottom:20px;">${escapeHtml(data.name)} – Mitt liv</h2>`;
    for (const ch of chapters) {
      html += `<h3 style="font-family:'Lora',serif;color:var(--gold);margin:20px 0 10px;">${escapeHtml(ch.title)}</h3>`;
      html += `<div style="line-height:1.8;white-space:pre-wrap;">${escapeHtml(ch.text)}</div>`;
    }
    html += `</div><button class="ghost" style="margin-top:16px;" onclick="closeDetail()">Lukk</button>`;
    document.getElementById('book-result').innerHTML = html;
  } catch (e) {
    document.getElementById('book-result').innerHTML =
      `<div style="color:var(--rust);">Kunne ikke lage bok: ${escapeHtml(e.message)}</div>
       <button class="ghost" style="margin-top:16px;" onclick="closeDetail()">Lukk</button>`;
  }
}
</script>
</body>
</html>
