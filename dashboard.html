<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minnio – Opprett samtale</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0A06; --surface: #231508;
  --gold: #C8933A; --gold2: #E0B060;
  --text: #F0E8DC; --text2: #A8896E;
  --sage: #6B8F68;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text); min-height:100vh;
  font-family:'DM Sans',sans-serif;
  display:flex; align-items:center; justify-content:center; padding:32px 20px;
}
.wrap { max-width:560px; width:100%; }
h1 { font-family:'Lora',serif; color:var(--gold2); font-size:1.8rem; margin-bottom:8px; }
p.intro { color:var(--text2); margin-bottom:24px; line-height:1.5; }
.section { font-size:0.85rem; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin:24px 0 12px; }
.row { margin-bottom:16px; }
label { display:block; color:var(--text2); font-size:0.9rem; margin-bottom:6px; }
input, textarea, select {
  width:100%; background:var(--surface); border:1px solid rgba(200,147,58,0.2);
  color:var(--text); padding:12px 14px; border-radius:8px;
  font-family:inherit; font-size:1rem;
}
input:focus, textarea:focus, select:focus { outline:none; border-color:var(--gold); }
textarea { min-height:80px; resize:vertical; }
.go-btn {
  width:100%; background:var(--gold); color:var(--bg); border:none;
  padding:16px; border-radius:8px; font-size:1.05rem; font-weight:500;
  cursor:pointer; margin-top:24px; transition:0.2s;
}
.go-btn:hover { background:var(--gold2); }
.go-btn:disabled { opacity:0.5; cursor:not-allowed; }
.success { background:rgba(107,143,104,0.15); border:1px solid var(--sage); padding:20px; border-radius:8px; margin-top:24px; display:none; }
.success.show { display:block; }
.link-box {
  background:var(--bg); border:1px solid var(--gold); padding:12px;
  border-radius:6px; word-break:break-all; margin:12px 0;
  color:var(--gold2); font-family:monospace;
}
.copy-btn {
  background:var(--gold); color:var(--bg); border:none;
  padding:10px 16px; border-radius:6px; cursor:pointer;
  font-size:0.9rem; margin-right:8px; margin-top:8px;
}
.note { font-size:0.85rem; color:var(--text2); margin-top:8px; }
.error { background:rgba(200,80,80,0.15); border:1px solid #c85050; padding:12px; border-radius:6px; color:#ffc8c8; margin-top:12px; display:none; }
.error.show { display:block; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minnio – Opprett samtale</h1>
  <p class="intro">Fyll inn litt om personen som skal fortelle. Når du klikker "Opprett", får du en lenke du kan sende.</p>

  <a href="/dashboard.html" style="display:inline-block;margin-bottom:20px;color:var(--gold2);text-decoration:none;border:1px solid var(--gold);padding:10px 18px;border-radius:8px;font-size:0.95rem;">📖 Gå til bok-barometeret (se alle samtaler og lag bøker) →</a>

  <div class="section">Forteller (mottaker av lenken)</div>

  <div class="row">
    <label>Navn *</label>
    <input type="text" id="name" placeholder="f.eks. Ingrid eller Olav">
  </div>

  <div class="row">
    <label>Kjønn (slik at Minna bruker riktig pronomen)</label>
    <select id="gender">
      <option value="kvinne">Kvinne (hun/henne)</option>
      <option value="mann">Mann (han/ham)</option>
    </select>
  </div>

  <div class="row">
    <label>Alder</label>
    <select id="age">
      <option value="60–70 år">60–70 år</option>
      <option value="70–80 år" selected>70–80 år</option>
      <option value="80–90 år">80–90 år</option>
      <option value="90+ år">90+ år</option>
    </select>
  </div>

  <div class="row">
    <label>Hvor er fortelleren fra?</label>
    <input type="text" id="place" placeholder="f.eks. Sunnmøre, Telemark, Lofoten">
  </div>

  <div class="row">
    <label>Nøkkelord (komma-separert)</label>
    <input type="text" id="keywords" placeholder="f.eks. sykepleier, lærer, gårdsbruk, krigen">
  </div>

  <div class="row">
    <label>Noe spesielt vi bør vite?</label>
    <textarea id="extra" placeholder="f.eks. Mistet ektefellen for noen år siden. Liker å fortelle om barndommen på Sørlandet."></textarea>
  </div>

  <div class="section">Kjøper (deg)</div>

  <div class="row">
    <label>Ditt navn</label>
    <input type="text" id="buyer-name" placeholder="Hva fortelleren skal kalle deg">
  </div>

  <div class="row">
    <label>Din e-post</label>
    <input type="email" id="buyer-email" placeholder="navn@e-post.no">
  </div>

  <div class="row">
    <label>Fortellerens telefonnummer</label>
    <input type="tel" id="buyer-phone" placeholder="+47 12345678">
  </div>

  <div class="row">
    <label>Pakke</label>
    <select id="tier">
      <option value="digital">Digital bok (499 kr)</option>
      <option value="hardcover">Innbundet bok (1 199 kr)</option>
      <option value="heritage">Arvepakken (2 499 kr)</option>
    </select>
  </div>

  <button class="go-btn" id="create-btn" onclick="createSession()">Opprett samtale →</button>

  <div class="error" id="error"></div>

  <div class="success" id="success">
    <p style="color:var(--gold2); margin-bottom:8px;"><strong>Samtale opprettet!</strong></p>
    <p class="note">Send denne lenken til fortelleren:</p>
    <div class="link-box" id="link"></div>
    <button class="copy-btn" onclick="copyLink()">📋 Kopier lenke</button>
    <button class="copy-btn" onclick="copySms()" style="background:var(--sage); color:white;">📱 Kopier SMS-tekst</button>
    <div class="note" style="display:none;" id="sms-container">
      <p style="margin-top:12px; margin-bottom:8px;">SMS-tekst:</p>
      <div class="link-box" id="sms" style="white-space:pre-wrap;"></div>
    </div>
  </div>
</div>

<script>
async function createSession() {
  const btn = document.getElementById('create-btn');
  const errorBox = document.getElementById('error');
  errorBox.classList.remove('show');

  const name = document.getElementById('name').value.trim();
  if (!name) {
    errorBox.textContent = 'Du må skrive inn navn på fortelleren';
    errorBox.classList.add('show');
    return;
  }

  const keywords = document.getElementById('keywords').value
    .split(',').map(s => s.trim()).filter(Boolean);

  const profile = {
    name,
    gender: document.getElementById('gender').value,
    age: document.getElementById('age').value,
    place: document.getElementById('place').value.trim(),
    keywords,
    extra: document.getElementById('extra').value.trim()
  };

  const buyer = {
    name: document.getElementById('buyer-name').value.trim(),
    email: document.getElementById('buyer-email').value.trim(),
    phone: document.getElementById('buyer-phone').value.trim()
  };

  const tier = document.getElementById('tier').value;

  btn.disabled = true;
  btn.textContent = 'Oppretter...';

  try {
    const res = await fetch('/api/session/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ profile, buyer, tier })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Feilet');

    const fullUrl = data.fullUrl;
    document.getElementById('link').textContent = fullUrl;

    const buyerLabel = buyer.name || 'familien din';
    document.getElementById('sms').textContent =
`Hei ${name}!

${buyerLabel} har laget en spesiell gave til deg – en samtale om livet ditt og historiene dine, som blir til en bok familien kan ta vare på.

Trykk på lenken under når du har 30-40 min ro. Du kan også pause og fortsette senere – alt blir lagret.

${fullUrl}

Klem fra ${buyerLabel}`;

    document.getElementById('success').classList.add('show');
    btn.style.display = 'none';
  } catch (e) {
    errorBox.textContent = 'Feil: ' + e.message;
    errorBox.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Opprett samtale →';
  }
}

function copyLink() {
  const text = document.getElementById('link').textContent;
  navigator.clipboard.writeText(text);
  event.target.textContent = '✓ Kopiert!';
  setTimeout(() => { event.target.textContent = '📋 Kopier lenke'; }, 1500);
}

function copySms() {
  const text = document.getElementById('sms').textContent;
  navigator.clipboard.writeText(text);
  document.getElementById('sms-container').style.display = 'block';
  event.target.textContent = '✓ Kopiert!';
  setTimeout(() => { event.target.textContent = '📱 Kopier SMS-tekst'; }, 1500);
}
</script>
</body>
</html>
